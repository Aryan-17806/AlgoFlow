<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fibonacci Recorder v5</title>
<style>
  *{box-sizing:border-box}
  /* body{
    margin:0;
    background:transparent;
    color:#f6f7f8;
    font-family:'Courier New',monospace;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    padding:20px;
  } */
  body{
  margin:0;
  background:#000;
  color:#cfe8ff;
  font-family:'Courier New',monospace;

  display:flex;
  justify-content:center;
  align-items:center;

  height:100vh;

  overflow:hidden;   
}
  #wrap{
    width:min(100%, 980px);
    background:transparent;
    border:1.5px solid rgba(4, 34, 72, 0.35);
    border-radius:14px;
    padding:16px;
    overflow:hidden;
    box-shadow:0 18px 60px rgba(0,0,0,.35);
  }
  canvas{
    width:100%;
    height:auto;
    display:block;
    border-radius:10px;
    border:1px solid rgba(80,140,210,.2);
    background:transparent;
  }
  #controls{
    display:flex;
    gap:12px;
    margin-top:14px;
    flex-wrap:wrap;
  }
  button{
    flex:1 1 240px;
    min-height:46px;
    padding:10px 14px;
    background:transparent;
    border:1px solid #1e6ab0;
    color:#01080e;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    font-family:'Courier New',monospace;
  }
  #recBtn{border-color:#e74c3c;color:#ffd8d4}
  #recBtn.recording{animation:pulse .8s ease-in-out infinite alternate}
  @keyframes pulse{from{opacity:1}to{opacity:.55}}
  #status{
    text-align:center;
    font-size:13px;
    color:#7fb6dd;
    margin-top:10px;
    min-height:18px;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="fc"></canvas>
  <div id="status">Ready</div>
</div>

<script>
(function(){

const DPR = Math.min(window.devicePixelRatio || 1, 2);
const CW = 940, CH = 640;

const cv = document.getElementById('fc');
cv.width = CW * DPR;
cv.height = CH * DPR;

const ctx = cv.getContext('2d');
ctx.scale(DPR, DPR);

const st = document.getElementById('status');

let leafCounter = 0;


function makeTree(n, depth){
  const node = { n, lbl:'fib(' + n + ')', ch:[], depth };
  if(n > 1){
    node.ch.push(makeTree(n-1, depth+1));
    node.ch.push(makeTree(n-2, depth+1));
  }
  return node;
}


function getDFSOrder(node, arr=[]){
  arr.push(node);
  node.ch.forEach(c => getDFSOrder(c, arr));
  return arr;
}


function assignLeafOrder(node){
  if(!node.ch.length){
    node.rx = leafCounter++;
    return;
  }
  node.ch.forEach(assignLeafOrder);
  node.rx = (node.ch[0].rx + node.ch[node.ch.length-1].rx)/2;
}

function flatten(root){
  const out=[], q=[root];
  while(q.length){
    const n=q.shift();
    out.push(n);
    n.ch.forEach(c=>{
      c.par=n;
      q.push(c);
    });
  }
  return out;
}


const tree = makeTree(5,0);

assignLeafOrder(tree);

const all = flatten(tree);
const dfsOrder = getDFSOrder(tree);

let maxLeaf = leafCounter - 1;
let maxDepth = 0;

all.forEach(n => maxDepth = Math.max(maxDepth, n.depth));


const RX=24, RY=15;
const TREE_X0=30;
const TREE_X1=535;
const TREE_TOP=88;
const TREE_BOTTOM=48;

const usableWidth=(TREE_X1-TREE_X0)-RX*2;
const usableHeight=(CH-TREE_TOP-TREE_BOTTOM)-RY*2;

const sx=maxLeaf>0 ? usableWidth/maxLeaf : 0;
const sy=maxDepth>0 ? usableHeight/maxDepth : 0;

all.forEach(n=>{
  n.cx = TREE_X0 + RX + n.rx*sx;
  n.cy = TREE_TOP + RY + n.depth*sy;
});


const pIdx=[];

all.forEach((n,i)=>{
  pIdx[i]=-1;
  if(n.par){
    for(let j=0;j<all.length;j++){
      if(all[j]===n.par){
        pIdx[i]=j;
        break;
      }
    }
  }
});


let vis=Array(all.length).fill(false);
let alp=Array(all.length).fill(0);

let revealIndex=0;
let lastTs=null;
let done=false;

const DELAY=600;


function drawStatic(){

ctx.clearRect(0,0,CW,CH);

ctx.fillStyle='#000000';
ctx.fillRect(0,0,CW,CH);

ctx.fillStyle='#FFFFFF';
ctx.font='bold 24px Courier New';
ctx.fillText('                                                          Fibonacci Recursion Visualization',36,38);

}

function drawEdge(i){

const pi=pIdx[i];
if(pi<0 || !vis[pi]) return;

const p=all[pi];
const n=all[i];

ctx.strokeStyle='#FFFFFF';
ctx.lineWidth=2;

ctx.beginPath();
ctx.moveTo(p.cx,p.cy+RY);
ctx.lineTo(n.cx,n.cy-RY);
ctx.stroke();
}

function drawNode(i){

if(alp[i]<=0) return;

const n=all[i];

ctx.globalAlpha=alp[i];

ctx.beginPath();
ctx.ellipse(n.cx,n.cy,RX,RY,0,0,Math.PI*2);

ctx.fillStyle='rgba(255,255,255,0.45)';
ctx.fill();

ctx.strokeStyle='#ffffff';
ctx.stroke();

ctx.fillStyle='#ffffff';
ctx.font='bold 12px Courier New';
ctx.textAlign='center';
ctx.textBaseline='middle';

ctx.fillText(n.lbl,n.cx,n.cy);

ctx.globalAlpha=1;
}


function reveal(){

if(revealIndex >= dfsOrder.length) return;

const node = dfsOrder[revealIndex];
const index = all.indexOf(node);

vis[index] = true;
alp[index] = 0.01;

revealIndex++;

st.textContent =
revealIndex < dfsOrder.length
? "Building recursion... " + revealIndex
: "f(5) = 5 ✓";

}


function animate(ts){

if(lastTs===null){
  lastTs=ts;
  reveal();
}
else if(ts-lastTs>=DELAY && revealIndex<dfsOrder.length){
  reveal();
  lastTs=ts;
}

for(let i=0;i<all.length;i++){
  if(vis[i] && alp[i]<1){
    alp[i]=Math.min(1,alp[i]+0.055);
  }
}

drawStatic();

for(let i=0;i<all.length;i++){
  if(vis[i]) drawEdge(i);
}

for(let i=0;i<all.length;i++){
  if(vis[i]) drawNode(i);
}

const finished =
revealIndex >= dfsOrder.length &&
alp.every(v=>v>=1);

if(finished && !done){
  done=true;
  setTimeout(()=>{
    reset();
    lastTs=null;
    done=false;
  },1500);
}

requestAnimationFrame(animate);
}


function reset(){

vis=Array(all.length).fill(false);
alp=Array(all.length).fill(0);

revealIndex=0;
lastTs=null;
done=false;

}

requestAnimationFrame(animate);

})();
</script>
</body>
</html>
